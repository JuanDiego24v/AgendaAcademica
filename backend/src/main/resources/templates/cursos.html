<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cursos | Agenda Académica</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root {
    --black:       #0a0a0a;
    --black-soft:  #111111;
    --black-card:  #161616;
    --black-hover: #1e1e1e;
    --orange:      #E87620;
    --orange-glow: #ff8c2a;
    --orange-dim:  #b85c14;
    --orange-pale: rgba(232,118,32,0.08);
    --orange-line: rgba(232,118,32,0.25);
    --white:       #f0ede8;
    --muted:       #6a6560;
    --border:      rgba(255,255,255,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
    z-index: 9999;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed; left: 0; top: 0;
    width: 72px; height: 100vh;
    background: var(--black-soft);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 28px 0;
    gap: 8px;
    z-index: 100;
    transition: width 0.35s cubic-bezier(.77,0,.18,1);
  }
  .sidebar:hover { width: 200px; }

  .sidebar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--orange);
    letter-spacing: 2px;
    margin-bottom: 32px;
    white-space: nowrap;
    overflow: hidden;
    width: 100%;
    text-align: center;
    padding: 0 16px;
  }

  .nav-item {
    width: 100%;
    display: flex; align-items: center;
    gap: 14px;
    padding: 12px 22px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.2s ease;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
    color: var(--white);
    text-decoration: none;
    user-select: none;
  }
  .nav-item:hover, .nav-item.active {
    background: var(--orange-pale);
    border-left-color: var(--orange);
    color: var(--orange);
  }
  .nav-icon {
    font-size: 18px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .nav-label {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.2s ease 0.1s;
  }
  .sidebar:hover .nav-label { opacity: 1; }

  /* MAIN */
  .main {
    margin-left: 72px;
    padding: 48px 52px;
    min-height: 100vh;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* HEADER */
  .page-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 6vw, 80px);
    line-height: 0.95;
    letter-spacing: 1px;
    color: var(--white);
  }
  .page-title span { color: var(--orange); }
  .header-line {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, var(--orange) 0%, transparent 60%);
    margin: 28px 0 40px;
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* BUTTON */
  .btn-add {
    background: var(--orange);
    color: var(--black);
    border: none;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 24px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-add:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(232,118,32,0.35);
  }

  /* TABLE */
  .dark-table { width: 100%; border-collapse: collapse; }
  .dark-table th {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
    text-align: left;
  }
  .dark-table td {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    color: var(--white);
    vertical-align: middle;
  }
  .dark-table tbody tr { transition: background 0.15s ease; }
  .dark-table tbody tr:hover td { background: var(--black-hover); }
  .dark-table .course-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.5px;
  }

  /* ACTION BUTTONS */
  .btn-action {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 2px;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.2s ease;
    border: 1px solid;
  }
  .btn-action-edit {
    background: transparent;
    color: var(--orange);
    border-color: var(--orange-line);
  }
  .btn-action-edit:hover { background: var(--orange-pale); border-color: var(--orange); }
  .btn-action-delete {
    background: transparent;
    color: #e05555;
    border-color: rgba(220,40,40,0.3);
  }
  .btn-action-delete:hover { background: rgba(220,40,40,0.08); }

  .empty-row td {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-align: center;
    padding: 40px !important;
  }

  /* MODAL */
  .modal-content {
    background: var(--black-card) !important;
    border: 1px solid var(--border) !important;
    border-radius: 4px !important;
    color: var(--white) !important;
  }
  .modal-header { border-bottom: 1px solid var(--border) !important; }
  .modal-footer { border-top: 1px solid var(--border) !important; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif !important;
    font-size: 24px !important;
    letter-spacing: 1px !important;
    color: var(--white) !important;
  }
  .btn-close { filter: invert(1) !important; opacity: 0.5 !important; }
  .btn-close:hover { opacity: 1 !important; }

  .form-control {
    background: var(--black-hover) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: var(--white) !important;
    border-radius: 3px !important;
  }
  .form-control:focus {
    background: var(--black-hover) !important;
    border-color: var(--orange) !important;
    box-shadow: 0 0 0 3px var(--orange-pale) !important;
    color: var(--white) !important;
  }
  .form-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .btn-save {
    background: var(--orange);
    color: var(--black);
    border: none;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 20px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-save:hover { box-shadow: 0 4px 16px rgba(232,118,32,0.35); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">AA</div>

  <a class="nav-item" href="/home">
    <span class="nav-icon">⊟</span>
    <span class="nav-label">Dashboard</span>
  </a>
  <div class="nav-item active">
    <span class="nav-icon">◈</span>
    <span class="nav-label">Cursos</span>
  </div>
  <a class="nav-item" href="/examenes">
    <span class="nav-icon">✦</span>
    <span class="nav-label">Exámenes</span>
  </a>
  <a class="nav-item" href="/calendario">
    <span class="nav-icon">◫</span>
    <span class="nav-label">Calendario</span>
  </a>
  <a class="nav-item" href="/change-password" style="margin-top:auto">
    <span class="nav-icon">⚙</span>
    <span class="nav-label">Contraseña</span>
  </a>
  <div class="nav-item" onclick="document.getElementById('logoutForm').submit()">
    <span class="nav-icon">⏻</span>
    <span class="nav-label">Logout</span>
  </div>
</nav>

<form id="logoutForm" th:action="@{/logout}" method="post" style="display:none"></form>

<!-- MAIN -->
<main class="main">

  <div class="page-eyebrow">Gestión</div>
  <h1 class="page-title">MIS<br><span>CURSOS</span></h1>
  <div class="header-line"></div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="section-title" style="flex:1;margin-bottom:0">Lista de cursos</div>
    <button class="btn-add ms-3"
            data-bs-toggle="modal"
            data-bs-target="#cursoModal"
            onclick="limpiarModal()">
      + Añadir Curso
    </button>
  </div>

  <table class="dark-table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th style="text-align:right">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="curso : ${cursos}">
        <td>
          <span class="course-name" th:text="${curso.nombre}"></span>
        </td>
        <td style="text-align:right">
          <button class="btn-action btn-action-edit me-2"
                  data-bs-toggle="modal"
                  data-bs-target="#cursoModal"
                  th:attr="onclick=|editarCurso('${curso.id}','${curso.nombre}')|">
            Editar
          </button>
          <form th:action="@{/cursos/eliminar/{id}(id=${curso.id})}"
                method="post"
                class="d-inline">
            <button class="btn-action btn-action-delete"
                    onclick="return confirm('¿Eliminar este curso?')">
              Eliminar
            </button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(cursos)}" class="empty-row">
        <td colspan="2">Aún no tenés cursos registrados</td>
      </tr>
    </tbody>
  </table>

</main>

<!-- MODAL -->
<div class="modal fade" id="cursoModal" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" id="cursoForm" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Añadir curso</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="cursoId" name="id">
        <div class="mb-3">
          <label class="form-label">Nombre del curso</label>
          <input type="text" id="nombre" name="nombre" class="form-control" required>
        </div>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn-save">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function limpiarModal() {
    document.getElementById('modalTitle').innerText = "Añadir curso";
    document.getElementById('cursoId').value = "";
    document.getElementById('nombre').value = "";
    document.getElementById('cursoForm').action = "/cursos/guardar";
  }

  function editarCurso(id, nombre) {
    document.getElementById('modalTitle').innerText = "Editar curso";
    document.getElementById('cursoId').value = id;
    document.getElementById('nombre').value = nombre;
    document.getElementById('cursoForm').action = "/cursos/editar";
  }
</script>

</body>
</html>
