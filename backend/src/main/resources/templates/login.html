<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login | Agenda Académica</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root {
    --black:       #0a0a0a;
    --black-soft:  #111111;
    --black-card:  #161616;
    --black-hover: #1e1e1e;
    --orange:      #E87620;
    --orange-glow: #ff8c2a;
    --orange-pale: rgba(232,118,32,0.08);
    --orange-line: rgba(232,118,32,0.25);
    --white:       #f0ede8;
    --muted:       #6a6560;
    --border:      rgba(255,255,255,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
    z-index: 9999;
  }

  .auth-card {
    background: var(--black-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.5s ease both;
    position: relative;
  }

  .auth-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--orange), transparent);
    border-radius: 4px 4px 0 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--orange);
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .auth-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .form-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .form-control {
    background: var(--black-hover) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: var(--white) !important;
    border-radius: 3px !important;
    padding: 12px 16px !important;
    font-family: 'DM Sans', sans-serif !important;
    font-size: 14px !important;
    width: 100%;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--orange) !important;
    box-shadow: 0 0 0 3px var(--orange-pale) !important;
  }

  .btn-submit {
    background: var(--orange);
    color: var(--black);
    border: none;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s ease;
    margin-top: 8px;
  }
  .btn-submit:hover {
    box-shadow: 0 8px 24px rgba(232,118,32,0.35);
    transform: translateY(-1px);
  }

  .alert-dark-danger {
    background: rgba(220,40,40,0.1);
    border: 1px solid rgba(220,40,40,0.3);
    color: #e05555;
    border-radius: 3px;
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-align: center;
    margin-top: 16px;
  }

  .alert-dark-success {
    background: rgba(80,180,100,0.1);
    border: 1px solid rgba(80,180,100,0.25);
    color: #6dba7d;
    border-radius: 3px;
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-align: center;
    margin-top: 16px;
  }

  .auth-link {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--orange);
    text-decoration: none;
    text-transform: uppercase;
  }
  .auth-link:hover { color: var(--orange-glow); text-decoration: underline; }
  .auth-footer {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">AA</div>
  <div class="auth-subtitle">Agenda Académica</div>

  <form th:action="@{/login}" method="post">
    <div class="mb-4">
      <label class="form-label">Usuario</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn-submit">Entrar</button>
  </form>

  <div th:if="${param.error}" class="alert-dark-danger">
    Usuario o contraseña incorrectos
  </div>

  <div th:if="${param.logout}" class="alert-dark-success">
    Sesión cerrada correctamente
  </div>

  <div th:if="${param.passwordChanged}" class="alert-dark-success">
    Contraseña actualizada. Iniciá sesión nuevamente.
  </div>

  <div class="auth-footer">
    ¿No tenés cuenta? <a th:href="@{/register}" class="auth-link ms-1">Registrarse</a>
  </div>
</div>

</body>
</html>
