<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registro | Agenda Académica</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root {
    --black:       #0a0a0a;
    --black-card:  #161616;
    --black-hover: #1e1e1e;
    --orange:      #E87620;
    --orange-glow: #ff8c2a;
    --orange-pale: rgba(232,118,32,0.08);
    --orange-line: rgba(232,118,32,0.25);
    --white:       #f0ede8;
    --muted:       #6a6560;
    --border:      rgba(255,255,255,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 40px 16px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
    z-index: 9999;
  }

  .auth-card {
    background: var(--black-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.5s ease both;
    position: relative;
  }

  .auth-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--orange), transparent);
    border-radius: 4px 4px 0 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--orange);
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .auth-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .form-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .form-control {
    background: var(--black-hover) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: var(--white) !important;
    border-radius: 3px !important;
    padding: 12px 16px !important;
    font-family: 'DM Sans', sans-serif !important;
    font-size: 14px !important;
    width: 100%;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--orange) !important;
    box-shadow: 0 0 0 3px var(--orange-pale) !important;
  }

  .btn-submit {
    background: var(--orange);
    color: var(--black);
    border: none;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s ease;
    margin-top: 8px;
  }
  .btn-submit:hover {
    box-shadow: 0 8px 24px rgba(232,118,32,0.35);
    transform: translateY(-1px);
  }
  .btn-submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .alert-dark-danger {
    background: rgba(220,40,40,0.1);
    border: 1px solid rgba(220,40,40,0.3);
    color: #e05555;
    border-radius: 3px;
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-align: center;
    margin-top: 16px;
  }

  .auth-link {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--orange);
    text-decoration: none;
    text-transform: uppercase;
  }
  .auth-link:hover { color: var(--orange-glow); text-decoration: underline; }
  .auth-footer {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }

  .password-weak   { color: #e05555; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; }
  .password-medium { color: var(--orange); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; }
  .password-strong { color: #6dba7d; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; }
  .text-muted-mono { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">AA</div>
  <div class="auth-subtitle">Registro de usuario</div>

  <form th:action="@{/register}" th:object="${usuario}" method="post">
    <div class="mb-4">
      <label class="form-label">Usuario</label>
      <input type="text" th:field="*{username}" class="form-control" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Email</label>
      <input type="email" th:field="*{email}" class="form-control" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <input type="password" th:field="*{password}" class="form-control" id="password" required>
      <div class="mt-2">
        <small id="passwordHelp" class="text-muted-mono">Mínimo 6 caracteres</small>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Confirmar contraseña</label>
      <input type="password" id="confirmPassword" class="form-control" required>
      <div class="mt-2">
        <small id="confirmHelp"></small>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="submitBtn" disabled>Registrarse</button>
  </form>

  <div th:if="${error}" class="alert-dark-danger" th:text="${error}"></div>

  <div class="auth-footer">
    <a th:href="@{/login}" class="auth-link">← Volver al login</a>
  </div>
</div>

<script>
  const passwordInput = document.getElementById("password");
  const confirmInput = document.getElementById("confirmPassword");
  const helpText = document.getElementById("passwordHelp");
  const confirmHelp = document.getElementById("confirmHelp");
  const submitBtn = document.getElementById("submitBtn");

  function validarFormulario() {
    const pass = passwordInput.value;
    const confirm = confirmInput.value;
    let passwordValida = false;
    let confirmValida = false;

    if (pass.length === 0) {
      helpText.textContent = "Mínimo 6 caracteres";
      helpText.className = "text-muted-mono";
    } else if (pass.length < 6) {
      helpText.textContent = "Contraseña débil";
      helpText.className = "password-weak";
    } else if (pass.match(/[A-Z]/) && pass.match(/[0-9]/)) {
      helpText.textContent = "Contraseña fuerte";
      helpText.className = "password-strong";
      passwordValida = true;
    } else {
      helpText.textContent = "Aceptable — mejora con mayúscula y número";
      helpText.className = "password-medium";
      passwordValida = true;
    }

    if (confirm.length === 0) {
      confirmHelp.textContent = "";
    } else if (pass !== confirm) {
      confirmHelp.textContent = "Las contraseñas no coinciden";
      confirmHelp.className = "password-weak";
    } else {
      confirmHelp.textContent = "Las contraseñas coinciden";
      confirmHelp.className = "password-strong";
      confirmValida = true;
    }

    submitBtn.disabled = !(passwordValida && confirmValida);
  }

  passwordInput.addEventListener("input", validarFormulario);
  confirmInput.addEventListener("input", validarFormulario);
</script>

</body>
</html>
