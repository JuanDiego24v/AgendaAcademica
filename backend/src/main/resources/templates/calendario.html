<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Calendario | Agenda Académica</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root {
    --black:       #0a0a0a;
    --black-soft:  #111111;
    --black-card:  #161616;
    --black-hover: #1e1e1e;
    --orange:      #E87620;
    --orange-glow: #ff8c2a;
    --orange-dim:  #b85c14;
    --orange-pale: rgba(232,118,32,0.08);
    --orange-line: rgba(232,118,32,0.25);
    --white:       #f0ede8;
    --muted:       #6a6560;
    --border:      rgba(255,255,255,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
    z-index: 9999;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed; left: 0; top: 0;
    width: 72px; height: 100vh;
    background: var(--black-soft);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 28px 0; gap: 8px;
    z-index: 100;
    transition: width 0.35s cubic-bezier(.77,0,.18,1);
  }
  .sidebar:hover { width: 200px; }

  .sidebar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; color: var(--orange);
    letter-spacing: 2px; margin-bottom: 32px;
    white-space: nowrap; overflow: hidden;
    width: 100%; text-align: center; padding: 0 16px;
  }

  .nav-item {
    width: 100%; display: flex; align-items: center;
    gap: 14px; padding: 12px 22px;
    cursor: pointer; border-left: 2px solid transparent;
    transition: all 0.2s ease; position: relative;
    white-space: nowrap; overflow: hidden;
    color: var(--white); text-decoration: none; user-select: none;
  }
  .nav-item:hover, .nav-item.active {
    background: var(--orange-pale);
    border-left-color: var(--orange);
    color: var(--orange);
  }
  .nav-icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }
  .nav-label { font-size: 13px; font-weight: 400; letter-spacing: 0.5px; opacity: 0; transition: opacity 0.2s ease 0.1s; }
  .sidebar:hover .nav-label { opacity: 1; }

  /* ── MAIN ── */
  .main {
    margin-left: 72px;
    padding: 48px 52px;
    min-height: 100vh;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── HEADER ── */
  .page-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--orange);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 6vw, 80px);
    line-height: 0.95; letter-spacing: 1px; color: var(--white);
  }
  .page-title span { color: var(--orange); }
  .header-line {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, var(--orange) 0%, transparent 60%);
    margin: 28px 0 40px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── FULLCALENDAR DARK THEME ── */
  .calendar-container {
    background: var(--black-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
  }

  .fc { font-family: 'DM Sans', sans-serif !important; color: var(--white) !important; }

  .fc-theme-standard .fc-scrollgrid,
  .fc-theme-standard td,
  .fc-theme-standard th { border-color: var(--border) !important; }

  .fc-col-header-cell-cushion {
    color: var(--muted) !important;
    text-decoration: none !important;
    font-family: 'Space Mono', monospace !important;
    font-size: 10px !important;
    letter-spacing: 2px !important;
    text-transform: uppercase !important;
    padding: 10px 4px !important;
  }

  .fc-daygrid-day-number {
    color: var(--muted) !important;
    text-decoration: none !important;
    font-family: 'Space Mono', monospace !important;
    font-size: 11px !important;
    padding: 6px 8px !important;
  }

  .fc-day-today { background: var(--orange-pale) !important; }
  .fc-day-today .fc-daygrid-day-number {
    color: var(--orange) !important;
    font-weight: 700 !important;
  }

  .fc-button-primary {
    background: var(--orange) !important;
    border-color: var(--orange) !important;
    color: var(--black) !important;
    font-family: 'Space Mono', monospace !important;
    font-size: 10px !important;
    letter-spacing: 1.5px !important;
    text-transform: uppercase !important;
    border-radius: 3px !important;
    padding: 7px 14px !important;
    font-weight: 700 !important;
    transition: all 0.2s ease !important;
  }
  .fc-button-primary:hover { background: var(--orange-glow) !important; border-color: var(--orange-glow) !important; }
  .fc-button-primary:not(:disabled):active,
  .fc-button-primary:not(:disabled).fc-button-active {
    background: var(--orange-dim) !important;
    border-color: var(--orange-dim) !important;
  }
  .fc-button-primary:focus { box-shadow: 0 0 0 3px var(--orange-pale) !important; }

  .fc-toolbar-title {
    font-family: 'Bebas Neue', sans-serif !important;
    font-size: 32px !important;
    letter-spacing: 2px !important;
    color: var(--white) !important;
  }

  .fc-toolbar { margin-bottom: 20px !important; }
  .fc-toolbar.fc-header-toolbar { gap: 12px; }

  .fc .fc-daygrid-day-bg,
  .fc .fc-daygrid-body,
  .fc-scrollgrid-section-body td { background: transparent !important; }

  .fc-event {
    border: none !important;
    border-radius: 3px !important;
    cursor: pointer !important;
    margin-bottom: 2px !important;
  }
  .fc-event:hover { opacity: 0.85 !important; }
  .fc-event-main { padding: 0 !important; }

  .fc-list-day-cushion {
    background: var(--black-hover) !important;
    font-family: 'Space Mono', monospace !important;
    font-size: 11px !important;
    letter-spacing: 2px !important;
    text-transform: uppercase !important;
    color: var(--orange) !important;
  }
  .fc-list-event:hover td { background: var(--black-hover) !important; }
  .fc-list-event td { border-color: var(--border) !important; color: var(--white) !important; }
  .fc-list-empty { background: var(--black-card) !important; color: var(--muted) !important; }
  .fc-list-empty-cushion { font-family: 'Space Mono', monospace !important; font-size: 11px !important; letter-spacing: 1px !important; }
  .fc-list-event-time { display: none !important; }

  .fc-popover {
    background: var(--black-card) !important;
    border: 1px solid var(--border) !important;
    border-radius: 4px !important;
  }
  .fc-popover-header {
    background: var(--black-hover) !important;
    font-family: 'Space Mono', monospace !important;
    font-size: 10px !important;
    letter-spacing: 2px !important;
    text-transform: uppercase !important;
    color: var(--orange) !important;
    padding: 10px 14px !important;
  }
  .fc-popover-body { padding: 8px !important; }

  /* ── RIGHT PANEL ── */
  .panel {
    background: var(--black-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex; flex-direction: column;
  }

  .panel-header {
    padding: 20px 20px 0;
    flex-shrink: 0;
  }

  .panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 0 12px 12px;
  }
  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--orange-dim); border-radius: 2px; }

  /* ── EXAM ROW ── */
  .exam-row {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 8px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s ease;
    border-radius: 3px;
    cursor: default;
  }
  .exam-row:last-child { border-bottom: none; }
  .exam-row:hover { background: var(--black-hover); }

  .exam-row-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }
  .dot-urgent { background: #e05555; box-shadow: 0 0 6px rgba(220,85,85,0.5); }
  .dot-soon   { background: var(--orange); box-shadow: 0 0 6px rgba(232,118,32,0.5); }
  .dot-ok     { background: #6dba7d; box-shadow: 0 0 6px rgba(109,186,125,0.4); }
  .dot-future { background: var(--muted); }

  .exam-row-body { flex: 1; min-width: 0; }
  .exam-row-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 0.5px;
    color: var(--white); line-height: 1.1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .exam-row-course {
    font-size: 11px; color: var(--muted);
    margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .exam-row-pct {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--muted);
    margin-top: 2px;
  }
  .exam-row-pct span { color: var(--orange); }

  .exam-row-right { text-align: right; flex-shrink: 0; }
  .exam-row-date {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--orange);
    letter-spacing: 1px; white-space: nowrap;
  }
  .exam-row-days {
    font-size: 11px; color: var(--muted);
    margin-top: 3px; white-space: nowrap;
  }
  .days-urgent { color: #e05555; }
  .days-soon   { color: var(--orange); }
  .days-ok     { color: #6dba7d; }

  /* ── MONTH CHIP ── */
  .month-chip {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--orange);
    background: var(--orange-pale);
    border: 1px solid var(--orange-line);
    border-radius: 2px;
    padding: 4px 10px;
    display: inline-block;
    margin: 16px 8px 6px;
  }

  /* ── SUMMARY CHIPS ── */
  .summary-row {
    display: flex; gap: 10px; flex-wrap: wrap;
    padding: 16px 8px 4px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .summary-chip {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 12px; border-radius: 2px;
    border: 1px solid;
  }
  .chip-total  { color: var(--muted); border-color: var(--border); background: rgba(255,255,255,0.02); }
  .chip-urgent { color: #e05555; border-color: rgba(220,85,85,0.3); background: rgba(220,85,85,0.06); }
  .chip-soon   { color: var(--orange); border-color: var(--orange-line); background: var(--orange-pale); }
  .chip-ok     { color: #6dba7d; border-color: rgba(109,186,125,0.3); background: rgba(109,186,125,0.06); }

  .empty-panel {
    padding: 40px 20px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    color: var(--muted);
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--orange-dim); border-radius: 2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">AA</div>

  <a class="nav-item" href="/home">
    <span class="nav-icon">⊟</span>
    <span class="nav-label">Dashboard</span>
  </a>
  <a class="nav-item" href="/cursos">
    <span class="nav-icon">◈</span>
    <span class="nav-label">Cursos</span>
  </a>
  <a class="nav-item" href="/examenes">
    <span class="nav-icon">✦</span>
    <span class="nav-label">Exámenes</span>
  </a>
  <div class="nav-item active">
    <span class="nav-icon">◫</span>
    <span class="nav-label">Calendario</span>
  </div>
  <a class="nav-item" href="/change-password" style="margin-top:auto">
    <span class="nav-icon">⚙</span>
    <span class="nav-label">Contraseña</span>
  </a>
  <div class="nav-item" onclick="document.getElementById('logoutForm').submit()">
    <span class="nav-icon">⏻</span>
    <span class="nav-label">Logout</span>
  </div>
</nav>

<form id="logoutForm" th:action="@{/logout}" method="post" style="display:none">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
</form>

<!-- MAIN -->
<main class="main">

  <div class="page-eyebrow">Vista completa</div>
  <h1 class="page-title">CALENDARIO<br><span>ACADÉMICO</span></h1>
  <div class="header-line"></div>

  <div class="row g-4" style="align-items: flex-start">

    <!-- FULLCALENDAR -->
    <div class="col-12 col-lg-8">
      <div class="section-title">Agenda</div>
      <div class="calendar-container">
        <div id="calendar"></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="col-12 col-lg-4">
      <div class="section-title">Próximos exámenes</div>
      <div class="panel" style="max-height: 700px;">

        <div class="panel-header">
          <!-- Summary chips -->
          <div class="summary-row" id="summaryRow">
            <!-- Filled by JS -->
          </div>
        </div>

        <div class="panel-body" id="examList">

          <div th:if="${#lists.isEmpty(todosExamenes)}" class="empty-panel">
            Sin exámenes próximos
          </div>

          <!-- Exam rows with month separators -->
          <div th:each="ex, i : ${todosExamenes}"
               th:with="daysLeft=${T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), ex.fecha)},
                        prevFecha=${i.index > 0 ? todosExamenes[i.index - 1].fecha : null},
                        showMonthChip=${i.index == 0 or (prevFecha != null and prevFecha.monthValue != ex.fecha.monthValue)}">

            <!-- Month separator -->
            <div th:if="${showMonthChip}"
                 class="month-chip"
                 th:text="${#temporals.format(ex.fecha, 'MMMM yyyy')}">
            </div>

            <!-- Exam row -->
            <div class="exam-row">
              <div class="exam-row-dot"
                   th:classappend="${daysLeft < 7 ? 'dot-urgent' : (daysLeft < 14 ? 'dot-soon' : (daysLeft < 30 ? 'dot-ok' : 'dot-future'))}">
              </div>
              <div class="exam-row-body">
                <div class="exam-row-name" th:text="${ex.nombre}"></div>
                <div class="exam-row-course" th:text="${ex.curso.nombre}"></div>
                <div class="exam-row-pct">Peso: <span th:text="${ex.porcentaje + '%'}"></span></div>
              </div>
              <div class="exam-row-right">
                <div class="exam-row-date"
                     th:text="${#temporals.format(ex.fecha, 'dd MMM')}">
                </div>
                <div class="exam-row-days"
                     th:classappend="${daysLeft < 7 ? 'days-urgent' : (daysLeft < 14 ? 'days-soon' : 'days-ok')}">
                  <span th:text="${daysLeft}"></span>d
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>

  </div>
</main>

<!-- Datos para JS -->
<script th:inline="javascript">
  const examenes = [];
  /*[# th:each="ex : ${todosExamenes}"]*/
  examenes.push({
    nombre:     /*[[${ex.nombre}]]*/ '',
    fecha:      /*[[${ex.fecha}]]*/ '',
    curso:      /*[[${ex.curso.nombre}]]*/ '',
    porcentaje: /*[[${ex.porcentaje}]]*/ 0,
    dias:       /*[[${T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), ex.fecha)}]]*/ 0
  });
  /*[/]*/
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar/index.global.min.js"></script>
<script>
  // ── SUMMARY CHIPS ──
  (function buildSummary() {
    const total    = examenes.length;
    const urgentes = examenes.filter(e => e.dias <= 7).length;
    const proximos = examenes.filter(e => e.dias > 7 && e.dias <= 14).length;
    const resto    = examenes.filter(e => e.dias > 14).length;

    const row = document.getElementById('summaryRow');
    row.innerHTML = `
      <span class="summary-chip chip-total">${total} total</span>
      ${urgentes > 0 ? `<span class="summary-chip chip-urgent">${urgentes} urgente${urgentes > 1 ? 's' : ''}</span>` : ''}
      ${proximos > 0 ? `<span class="summary-chip chip-soon">${proximos} en 2 sem</span>` : ''}
      ${resto    > 0 ? `<span class="summary-chip chip-ok">${resto} planificado${resto > 1 ? 's' : ''}</span>` : ''}
    `;
  })();

  // ── FULLCALENDAR ──
  document.addEventListener('DOMContentLoaded', function () {
    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'dayGridMonth',
      locale: 'es',
      height: 660,
      headerToolbar: {
        left:   'prev,next today',
        center: 'title',
        right:  'dayGridMonth,dayGridWeek,listMonth'
      },
      buttonText: {
        today:     'Hoy',
        month:     'Mes',
        week:      'Semana',
        list:      'Lista'
      },
      events: '/api/examenes/eventos',
      eventContent: function(arg) {
        const curso      = arg.event.extendedProps.curso      || '';
        const porcentaje = arg.event.extendedProps.porcentaje || 0;
        const days = Math.ceil((new Date(arg.event.startStr) - new Date()) / 86400000);
        const urgent = days <= 7;

        return {
          html: `
            <div style="
              background: ${urgent
                ? 'linear-gradient(135deg,#8a1a10,#c03020)'
                : 'linear-gradient(135deg,#b85c14,#E87620)'};
              border-radius: 3px;
              padding: 4px 8px;
              overflow: hidden;
            ">
              <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.5px;line-height:1.1;color:#fff">
                ${arg.event.title}
              </div>
              <div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.7);font-family:'Space Mono',monospace;margin-top:1px">
                ${curso} · ${porcentaje}%
              </div>
            </div>
          `
        };
      },
      eventClick: function(info) {
        const days = Math.ceil((new Date(info.event.startStr) - new Date()) / 86400000);
        const curso = info.event.extendedProps.curso || '';
        const pct   = info.event.extendedProps.porcentaje || 0;
        // highlight matching row in the side panel
        highlightRow(info.event.title);
      },
      dayCellDidMount: function(info) {
        info.el.style.background = 'transparent';
      }
    });
    calendar.render();
  });

  // ── HIGHLIGHT SIDE PANEL ROW ──
  function highlightRow(nombre) {
    document.querySelectorAll('.exam-row').forEach(r => {
      r.style.background = '';
    });
    document.querySelectorAll('.exam-row').forEach(r => {
      const nameEl = r.querySelector('.exam-row-name');
      if (nameEl && nameEl.textContent.trim() === nombre.trim()) {
        r.style.background = 'var(--black-hover)';
        r.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    });
  }
</script>

</body>
</html>
