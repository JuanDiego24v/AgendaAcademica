<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | ExamTrack</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: #f8f9fa;
        }

        .login-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.15);
        }

        .accent {
            color: #ff8c00;
        }

        .btn-accent {
            background-color: #ff8c00;
            border: none;
        }

        .btn-accent:hover {
            background-color: #e67e00;
        }

        .form-control {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            color: #fff;
            border-color: #ff8c00;
            box-shadow: none;
        }

        a {
            color: #ff8c00;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
        .logo-container {
            display: inline-flex;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .logo-short {
            font-size: 2rem;
            font-weight: bold;
            transition: margin-right 0.4s ease;
        }

        .logo-full {
            max-width: 0;
            white-space: nowrap;
            overflow: hidden;
            font-size: 1rem;
            color: #adb5bd;
            transition: max-width 0.4s ease, margin-left 0.4s ease;
        }

        .logo-container:hover .logo-full {
            max-width: 200px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="col-md-4">

        <div class="login-card p-4">
            <!--<div class="text-center mb-4">
                <h2 class="fw-bold">
                    <span class="accent">AA</span>
                </h2>
                <p class="text-secondary mb-0">Agenda Académica</p>
            </div>-->
            
            <div class="text-center mb-4">
                <div class="logo-container">
                    <span class="logo-short accent">AA</span>
                    <span class="logo-full">Agenda Académica</span>
                </div>
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-accent fw-semibold">
                        Entrar
                    </button>
                </div>
            </form>

            <div th:if="${param.error}" class="alert alert-danger mt-3 py-2 text-center">
                Usuario o contraseña incorrectos
            </div>

            <div th:if="${param.logout}" class="alert alert-success mt-3 py-2 text-center">
                Sesión cerrada correctamente
            </div>

            <div th:if="${param.passwordChanged}"
                 class="alert alert-success mt-3 py-2 text-center">
                Contraseña actualizada correctamente. Inicia sesión nuevamente.
            </div>

            <div class="text-center mt-3">
                <span class="text-secondary">¿No tienes cuenta?</span>
                <a th:href="@{/register}" class="ms-1">Regístrate</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
