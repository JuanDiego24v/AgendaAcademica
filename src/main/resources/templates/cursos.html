<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cursos | Agenda Académica</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .navbar {
            background-color: #000;
        }
        .navbar-brand {
            font-weight: bold;
            color: orange !important;
        }
        .nav-link {
            color: orange !important;
        }
        .aa-logo {
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .aa-logo:hover::after {
            content: " Agenda Académica";
            margin-left: 8px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a href="/home" class="navbar-brand aa-logo text-decoration-none">AA</a>

        <div class="ms-auto dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                Usuario
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button class="dropdown-item" type="submit">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

    <h2 class="mb-4">Gestión de Cursos 📚</h2>

    <!-- BOTÓN NUEVO -->
    <div class="mb-3">
        <button class="btn btn-warning"
                data-bs-toggle="modal"
                data-bs-target="#cursoModal"
                onclick="limpiarModal()">
            Añadir curso
        </button>
    </div>

    <!-- TABLA -->
    <table class="table table-hover">

        <thead>
        <tr>
            <th>Nombre</th>
            <th class="text-end">Acciones</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="curso : ${cursos}">

            <td th:text="${curso.nombre}"></td>

            <td class="text-end">

                <button class="btn btn-sm btn-outline-warning me-2"
                        data-bs-toggle="modal"
                        data-bs-target="#cursoModal"
                        th:attr="onclick=|editarCurso('${curso.id}','${curso.nombre}')|">
                    Editar
                </button>

                <form th:action="@{/cursos/eliminar/{id}(id=${curso.id})}"
                      method="post"
                      class="d-inline">

                    <button class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('¿Eliminar este curso?')">
                        Eliminar
                    </button>

                </form>

            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(cursos)}">
            <td colspan="2" class="text-muted">
                Aún no tienes cursos registrados.
            </td>
        </tr>

        </tbody>

    </table>

</div>

<!-- MODAL -->
<div class="modal fade" id="cursoModal" tabindex="-1">

    <div class="modal-dialog">

        <form class="modal-content" id="cursoForm" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Añadir curso</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="cursoId" name="id">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text"
                           id="nombre"
                           name="nombre"
                           class="form-control"
                           required>
                </div>

            </div>

            <div class="modal-footer">
                <button type="submit" class="btn btn-warning">
                    Guardar
                </button>
            </div>

        </form>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

    function limpiarModal() {

        document.getElementById('modalTitle').innerText = "Añadir curso";

        document.getElementById('cursoId').value = "";
        document.getElementById('nombre').value = "";

        document.getElementById('cursoForm').action = "/cursos/guardar";
    }

    function editarCurso(id, nombre) {

        document.getElementById('modalTitle').innerText = "Editar curso";

        document.getElementById('cursoId').value = id;
        document.getElementById('nombre').value = nombre;

        document.getElementById('cursoForm').action = "/cursos/editar";
    }

</script>

</body>
</html>
