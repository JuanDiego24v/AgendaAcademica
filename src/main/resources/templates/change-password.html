<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cambiar contraseña | ExamTrack</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: #f8f9fa;
        }

        .card-custom {
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.15);
        }

        .accent {
            color: #ff8c00;
        }

        .btn-accent {
            background-color: #ff8c00;
            border: none;
        }

        .btn-accent:hover {
            background-color: #e67e00;
        }

        .form-control {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            color: #fff;
            border-color: #ff8c00;
            box-shadow: none;
        }

        a {
            color: #ff8c00;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Logo hover */
        .logo-container {
            display: inline-flex;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .logo-short {
            font-size: 2rem;
            font-weight: bold;
        }

        .logo-full {
            max-width: 0;
            white-space: nowrap;
            overflow: hidden;
            font-size: 1rem;
            color: #adb5bd;
            transition: max-width 0.4s ease, margin-left 0.4s ease;
        }

        .logo-container:hover .logo-full {
            max-width: 200px;
            margin-left: 8px;
        }

        .password-weak { color: #dc3545; }
        .password-medium { color: #ffc107; }
        .password-strong { color: #28a745; }

    </style>
</head>
<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="col-md-4">

        <div class="card-custom p-4">

            <div class="text-center mb-4">
                <div class="logo-container">
                    <span class="logo-short accent">AA</span>
                    <span class="logo-full">Agenda Académica</span>
                </div>
                <p class="text-secondary mt-2 mb-0">Cambiar contraseña</p>
            </div>

            <!-- Mensajes -->
            <div th:if="${error}" class="alert alert-danger py-2 text-center"
                 th:text="${error}"></div>

            <div th:if="${success}" class="alert alert-success py-2 text-center"
                 th:text="${success}"></div>

            <form th:action="@{/change-password}" method="post">

                <!-- Contraseña actual -->
                <div class="mb-3">
                    <label class="form-label">Contraseña actual</label>
                    <input type="password"
                           name="currentPassword"
                           class="form-control"
                           required>
                </div>

                <!-- Nueva contraseña -->
                <div class="mb-3">
                    <label class="form-label">Nueva contraseña</label>
                    <input type="password"
                           name="newPassword"
                           class="form-control"
                           id="password"
                           required>
                    <small id="passwordHelp" class="text-muted">
                        Mínimo 6 caracteres
                    </small>
                </div>

                <!-- Confirmar contraseña -->
                <div class="mb-3">
                    <label class="form-label">Confirmar nueva contraseña</label>
                    <input type="password"
                           name="confirmPassword"
                           class="form-control"
                           id="confirmPassword"
                           required>
                    <small id="confirmHelp"></small>
                </div>

                <div class="d-grid">
                    <button type="submit"
                            class="btn btn-accent fw-semibold"
                            id="submitBtn"
                            disabled>
                        Actualizar contraseña
                    </button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/home}">← Volver</a>
            </div>
        </div>
    </div>
</div>

<script>
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const helpText = document.getElementById("passwordHelp");
    const confirmHelp = document.getElementById("confirmHelp");
    const submitBtn = document.getElementById("submitBtn");

    function validarFormulario() {
        const pass = passwordInput.value;
        const confirm = confirmInput.value;

        let passwordValida = false;
        let confirmValida = false;

        if (pass.length === 0) {
            helpText.textContent = "Mínimo 6 caracteres";
            helpText.className = "text-muted";
        } else if (pass.length < 6) {
            helpText.textContent = "Contraseña débil";
            helpText.className = "password-weak";
        } else if (pass.match(/[A-Z]/) && pass.match(/[0-9]/)) {
            helpText.textContent = "Contraseña fuerte";
            helpText.className = "password-strong";
            passwordValida = true;
        } else {
            helpText.textContent = "Contraseña aceptable (mejora con mayúscula y número)";
            helpText.className = "password-medium";
            passwordValida = true;
        }

        if (confirm.length === 0) {
            confirmHelp.textContent = "";
        } else if (pass !== confirm) {
            confirmHelp.textContent = "Las contraseñas no coinciden";
            confirmHelp.className = "password-weak";
        } else {
            confirmHelp.textContent = "Las contraseñas coinciden";
            confirmHelp.className = "password-strong";
            confirmValida = true;
        }

        submitBtn.disabled = !(passwordValida && confirmValida);
    }

    passwordInput.addEventListener("input", validarFormulario);
    confirmInput.addEventListener("input", validarFormulario);
</script>

</body>
</html>
