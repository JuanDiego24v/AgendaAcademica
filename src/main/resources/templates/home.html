<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Home | Agenda Académica</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body { background:#f5f6fa; }

        .navbar { background:#000; }
        .navbar-brand { color:orange!important; font-weight:bold; }

        .btn-orange {
            background:orange;
            border:none;
            color:black;
            font-weight:bold;
        }

        .card-hover:hover {
            transform:scale(1.02);
            transition:0.2s;
        }

        .evento-pro {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            border-radius: 8px;
            padding: 5px;
            color: black;
            font-size: 11px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .evento-titulo {
            font-weight: bold;
            font-size: 12px;
        }

        .evento-curso {
            font-size: 10px;
            opacity: 0.8;
        }

        .evento-porcentaje {
            font-size: 10px;
            font-weight: bold;
            text-align: right;
        }
    </style>

</head>

<body>

<!-- 🔝 NAVBAR -->

<nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

        <button class="navbar-toggler text-warning"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
            ☰
        </button>

        <a class="navbar-brand" href="/home">AA</a>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link text-warning" href="/cursos">Cursos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-warning" href="/examenes">Exámenes</a>
                </li>

            </ul>

            <!-- 👤 USER -->

            <div class="dropdown">

                <a class="nav-link dropdown-toggle text-warning"
                   data-bs-toggle="dropdown">
                    Usuario
                </a>

                <ul class="dropdown-menu dropdown-menu-end">

                    <li>
                        <a class="dropdown-item" href="/change-password">
                            Cambiar contraseña
                        </a>
                    </li>

                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button class="dropdown-item">Logout</button>
                        </form>
                    </li>

                </ul>

            </div>

        </div>

    </div>

</nav>

<!-- 🧩 CONTENIDO -->

<div class="container mt-4">

    <!-- 🔹 ACCIONES RÁPIDAS -->

    <div class="d-flex gap-3 mb-4">

        <a href="/cursos?openModal=true" class="btn btn-orange">
            ➕ Añadir Curso
        </a>

        <a href="/examenes?openModal=true" class="btn btn-orange">
            ➕ Añadir Examen
        </a>

    </div>

    <!-- 🔹 NOTIFICACIONES -->

    <div class="card mt-4">

        <div class="card-body">

            <h5>🔔 Próximos exámenes</h5>

            <div th:if="${#lists.isEmpty(proximosExamenes)}">
                <p class="text-muted">No tienes exámenes próximos 🎉</p>
            </div>

            <ul class="list-group">

                <li class="list-group-item"
                    th:each="ex : ${proximosExamenes}">

                    <strong th:text="${ex.nombre}"></strong>
                    <br>

                    <small th:text="${ex.curso.nombre}"></small>

                    <span class="badge bg-warning text-dark float-end"
                          th:text="${ex.fecha}">
                    </span>

                    <small th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), ex.fecha)} + ' días'"></small>

                </li>

            </ul>

        </div>

    </div>

    <!-- 🔹 CALENDARIO -->

    <div class="card mt-4">
        <div class="card-body">
            <div id="calendar"></div>
        </div>
    </div>

</div>
<script>

    document.addEventListener('DOMContentLoaded', function () {

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

            initialView: 'dayGridMonth',
            locale: 'es',
            height: 650,

            events: '/api/examenes',

            eventContent: function(arg) {

                const curso = arg.event.extendedProps.curso;
                const porcentaje = arg.event.extendedProps.porcentaje;

                return {
                    html: `
                    <div class="evento-pro">
                        <div class="evento-titulo">${arg.event.title}</div>
                        <div class="evento-curso">${curso}</div>
                        <div class="evento-porcentaje">${porcentaje}%</div>
                    </div>
                `
                };
            }

        });

        calendar.render();

    });

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar/index.global.min.js"></script>

</body>
</html>
